<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2D1B3D"/>
      <stop offset="55%" stop-color="#141a3a"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </radialGradient>
    <linearGradient id="vi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a6ff"/>
      <stop offset="100%" stop-color="#7D3FB8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)" fill="none" stroke="url(#vi)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="256" cy="256" r="150" opacity="0.55"/>
    <!-- stylised arcane "ash flame" rune -->
