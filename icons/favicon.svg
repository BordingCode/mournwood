    <path d="M256 196 L294 300 Q256 276 218 300 Z" opacity="0.85"/>
    <line x1="256" y1="330" x2="256" y2="384"/>
  </g>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#A855F7" stroke-width="4" opacity="0.35"/>
</svg>
